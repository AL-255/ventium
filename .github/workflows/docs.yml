name: Docs (Sphinx → GitHub Pages)

# Build the Sphinx instruction-reference documentation (docs/sphinx/) and deploy
# it to GitHub Pages. Uses the modern artifact-based Pages flow (no gh-pages
# branch): the build job uploads the rendered HTML as a Pages artifact and the
# deploy job publishes it.
#
# One-time repo setup (Settings → Pages → Build and deployment → Source:
# "GitHub Actions"). After that, every push to main that touches the docs
# rebuilds and redeploys to https://al-255.github.io/ventium/.

on:
  push:
    branches: [main]
    paths:
      - 'docs/sphinx/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege token + the Pages/OIDC perms the deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/sphinx/requirements.txt

      - name: Install Graphviz (provides `dot` for the architecture diagrams)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Sphinx
        run: pip install -r docs/sphinx/requirements.txt

      - name: Build HTML (warnings are errors)
        run: |
          sphinx-build -b html -W --keep-going docs/sphinx _site
          # Belt-and-suspenders: the artifact flow serves files as-is (no Jekyll),
          # but .nojekyll guarantees underscore dirs (_static) are never filtered.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
